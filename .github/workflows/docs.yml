name: Docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "README.md"
      - "mkdocs.yml"
      - "docs/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "README.md"
      - "mkdocs.yml"
      - "docs/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      site_changed: ${{ steps.site_changes.outputs.site_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect deployable site changes
        id: site_changes
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "site_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "site_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
            echo "site_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --quiet "$BEFORE_SHA" "$CURRENT_SHA" -- README.md mkdocs.yml docs; then
            echo "site_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "site_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Build docs
        run: uv run mkdocs build --clean --strict

      - name: Configure Pages
        if: github.event_name != 'pull_request' && steps.site_changes.outputs.site_changed == 'true'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && steps.site_changes.outputs.site_changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request' && needs.build.outputs.site_changed == 'true'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
